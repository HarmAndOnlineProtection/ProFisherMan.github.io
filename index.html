<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish? Nope! – VRC fishing accounts</title>
    <!-- No emojis, unique typography, more physical animation -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Use a mix: Fraunces for warm serif, Inter for clean UI (but not robotic) -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:opsz,wght@14..32,400;14..32,500&display=swap" rel="stylesheet">
    <style>
        /* reset & base — no emojis, just text and symbols via CSS/pseudo */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #181f29;
            background-image: radial-gradient(circle at 15% 30%, #2c4053 0%, #0b171f 90%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin: 0;
            animation: breathe 12s infinite alternate ease-in-out;
        }

        @keyframes breathe {
            0% { background-color: #181f29; }
            100% { background-color: #1e2d38; }
        }

        .paper {
            max-width: 760px;
            width: 100%;
            background: #e9e1d2;
            background-image: 
                linear-gradient(165deg, #cfc4b0 0%, #f0eadb 80%),
                repeating-linear-gradient(45deg, rgba(140, 120, 100, 0.03) 0px, rgba(140, 120, 100, 0.03) 8px, transparent 8px, transparent 16px);
            background-blend-mode: overlay;
            border-radius: 64px 64px 48px 48px;
            box-shadow: 0 30px 45px -20px #03080c, 0 0 0 2px #5e6f6f inset, 0 0 0 6px #f1e7d8 inset;
            padding: 42px 42px 38px;
            transition: box-shadow 0.3s;
            animation: float 7s infinite alternate;
        }

        .paper:hover {
            box-shadow: 0 35px 50px -18px #0d1c24, 0 0 0 2px #8f9b8b inset, 0 0 0 8px #faf3e5 inset;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-6px) rotate(0.2deg); }
        }

        /* header area without emojis, using decorative underlines */
        .title-block {
            margin-bottom: 32px;
            position: relative;
        }

        .main-title {
            font-family: 'Fraunces', serif;
            font-size: 4.2rem;
            font-weight: 700;
            line-height: 1;
            color: #2d3e47;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            text-shadow: 4px 4px 0 #b8a68f, 6px 6px 0 rgba(0,0,0,0.1);
            margin-bottom: 10px;
            word-break: keep-all;
            display: inline-block;
            background: #f7efe2;
            padding-right: 28px;
            border-radius: 0 40px 0 0;
        }

        .main-title span {
            background: #5b493c;
            color: #efe3d2;
            font-size: 1.4rem;
            font-weight: 500;
            padding: 10px 24px 10px 32px;
            margin-left: 16px;
            border-radius: 60px;
            display: inline-block;
            vertical-align: middle;
            box-shadow: 0 6px 0 #342b24;
            letter-spacing: 1px;
            font-family: 'Inter', sans-serif;
            text-shadow: none;
            transform: rotate(-1deg);
        }

        .strap {
            font-family: 'Fraunces', serif;
            font-size: 1.2rem;
            font-style: italic;
            color: #4e5f62;
            border-bottom: 3px wavy #a2816a;
            padding-bottom: 16px;
            margin-top: -8px;
            width: fit-content;
            padding-right: 60px;
            font-weight: 500;
        }

        /* selector cards — handcrafted look */
        .card {
            background: #fcf6ea;
            border-radius: 48px 48px 48px 12px;
            padding: 30px 28px;
            margin-bottom: 36px;
            border: 3px solid #6c7c7a;
            box-shadow: 0 14px 0 #3a4a47, 0 20px 20px -10px #281f19;
            transition: 0.2s;
        }

        .card:nth-of-type(2) {
            border-radius: 12px 48px 48px 48px;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 0 #3a4a47, 0 25px 25px -12px #221b16;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .card-header h2 {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 2rem;
            color: #251d17;
            background: #d9c9b3;
            padding: 8px 32px 8px 24px;
            border-radius: 100px;
            box-shadow: 5px 5px 0 #7c695b;
            letter-spacing: -0.3px;
            display: inline-block;
            border: 2px solid #5e5347;
        }

        .card-header .stamp {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            background: #bdc5b4;
            padding: 8px 20px;
            border-radius: 40px;
            color: #17242b;
            font-size: 1rem;
            border: 2px dashed #5d4f41;
            transform: rotate(-2deg);
        }

        /* money grid */
        .money-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
        }

        .money-unit {
            background: #b6b9a8;
            border: 4px solid #716553;
            color: #1b1f1c;
            font-weight: 600;
            font-size: 1.5rem;
            padding: 16px 10px;
            min-width: 110px;
            border-radius: 60px 20px 60px 20px;
            cursor: pointer;
            box-shadow: 0 9px 0 #4b4438, 0 7px 15px rgba(0,0,0,0.3);
            transition: 0.07s linear;
            font-family: 'Fraunces', serif;
            flex: 1 0 auto;
            text-align: center;
            letter-spacing: 0.2px;
            transform: rotate(0deg);
        }

        .money-unit.selected {
            background: #cd8f5a;
            border-color: #ffcf9a;
            color: #14180d;
            box-shadow: 0 6px 0 #794f2b, 0 10px 18px #3b281b;
            transform: translateY(3px) rotate(-0.5deg);
            font-weight: 700;
        }

        .money-unit small {
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            opacity: 0.8;
            display: inline-block;
            margin-left: 4px;
        }

        /* level zone */
        .level-zone {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .level-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 25px;
        }

        .level-label {
            font-family: 'Fraunces', serif;
            font-size: 2rem;
            font-weight: 600;
            color: #1f2f32;
            background: #b7b9a6;
            padding: 8px 26px;
            border-radius: 40px 8px 40px 8px;
            border: 3px solid #575e4b;
            box-shadow: 6px 6px 0 #3a443a;
        }

        .level-badge {
            background: #2f453b;
            color: #efe7d3;
            font-size: 2.8rem;
            font-weight: 600;
            font-family: 'Fraunces', serif;
            padding: 12px 36px;
            border-radius: 30px 10px 30px 10px;
            border: 4px solid #6f866b;
            box-shadow: 0 9px 0 #22352c;
            line-height: 1;
            min-width: 140px;
            text-align: center;
        }

        .slider-holder {
            flex: 2;
            min-width: 240px;
            position: relative;
            padding: 6px 0;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 22px;
            background: #b2aa92;
            border-radius: 40px;
            border: 3px solid #4b5441;
            box-shadow: inset 0 3px 8px #1f2f1d;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 46px;
            height: 46px;
            background: #dad1b9;
            border-radius: 60% 20% 60% 20%;
            border: 5px solid #766045;
            box-shadow: 0 8px 0 #4f3929, 0 5px 15px black;
            cursor: pointer;
            margin-top: -12px;
            transition: 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            background: #f3e7cf;
            transform: scale(1.04);
        }

        /* message block with handwriting vibe */
        .message-block {
            background: #ebddc6;
            border-radius: 80px 20px 80px 20px;
            padding: 28px 34px;
            margin: 32px 0 32px;
            border: 5px solid #a0977a;
            box-shadow: 0 15px 0 #575543, 0 18px 25px -8px #1f1f12;
            transition: 0.25s;
        }

        .message-block:hover {
            box-shadow: 0 18px 0 #575543, 0 22px 30px -8px #1f1f12;
        }

        .preview {
            background: #fcf5e6;
            font-family: 'Fraunces', serif;
            font-size: 1.7rem;
            font-weight: 500;
            line-height: 1.4;
            padding: 28px 32px;
            border-radius: 70px 16px 70px 16px;
            color: #171d1a;
            border: 4px solid #8b886b;
            margin-bottom: 32px;
            word-break: break-word;
            box-shadow: inset 0 2px 12px #948c78;
            letter-spacing: -0.01em;
        }

        .action-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .copy-trigger {
            background: #896a50;
            border: none;
            padding: 20px 32px;
            border-radius: 120px 20px 120px 20px;
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 1.4rem;
            color: #f0ead8;
            display: flex;
            align-items: center;
            gap: 18px;
            cursor: pointer;
            box-shadow: 0 12px 0 #4b392b, 0 15px 22px #221813;
            transition: 0.06s linear;
            border: 3px solid #dbbd9c;
            text-transform: uppercase;
        }

        .copy-trigger:active {
            transform: translateY(6px);
            box-shadow: 0 6px 0 #4b392b, 0 15px 22px #221813;
        }

        .destinations {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
        }

        .dest {
            background: #c2b3a1;
            padding: 16px 28px;
            border-radius: 40px 8px 40px 8px;
            text-decoration: none;
            color: #0b241f;
            font-weight: 600;
            font-family: 'Fraunces', serif;
            font-size: 1.2rem;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 4px solid #778761;
            box-shadow: 0 6px 0 #5f604a;
            transition: 0.1s;
        }

        .dest:hover {
            background: #dbcbb8;
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #5f604a;
        }

        .footnote {
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: #353f35;
            background: #dad2bd;
            padding: 14px 24px;
            border-radius: 100px;
            text-align: center;
            border: 2px solid #887f6a;
            margin-top: 22px;
            font-style: italic;
        }

        /* no emojis — pure css pseudo-elements for some character */
        .money-unit::before {
            content: "⌲";
            font-size: 1.2rem;
            margin-right: 8px;
            display: inline-block;
            color: #3d2e1d;
        }

        .dest::after {
            content: "↗";
            font-size: 1.2rem;
            margin-left: 10px;
            font-weight: 500;
        }

        /* remove all emoji / font-awesome references */
    </style>
</head>
<body>
    <div class="paper">
        <div class="title-block">
            <div class="main-title">
                Fish? Nope!
                <span>VRChat FISH</span>
            </div>
            <div class="strap">
                accounts for the fishing game — cast & catch
            </div>
        </div>

        <!-- Money selector -->
        <div class="card">
            <div class="card-header">
                <h2>credit</h2>
                <div class="stamp">in-game $</div>
            </div>
            <div class="money-grid" id="moneyGrid">
                <button class="money-unit" data-value="1000">1k <small>$</small></button>
                <button class="money-unit" data-value="10000">10k <small>$</small></button>
                <button class="money-unit" data-value="100000">100k <small>$</small></button>
                <button class="money-unit" data-value="1000000">1M <small>$</small></button>
                <button class="money-unit" data-value="10000000">10M <small>$</small></button>
                <button class="money-unit" data-value="100000000">100M <small>$</small></button>
            </div>
            <div style="text-align: right; margin-top: 18px; font-size: 1.2rem; font-family: 'Fraunces'; background: #cec3af; padding: 8px 16px; border-radius: 40px; display: inline-block; border: 2px solid #6b5f4c;">
                <span style="font-weight: 600;">selected:</span> <span id="selectedMoneyDisplay">1,000</span> $
            </div>
        </div>

        <!-- Level card -->
        <div class="card">
            <div class="card-header">
                <h2>rank</h2>
                <div class="stamp">level 1–500</div>
            </div>
            <div class="level-zone">
                <div class="level-row">
                    <span class="level-label">LV</span>
                    <span class="level-badge" id="levelValue">250</span>
                    <div class="slider-holder">
                        <input type="range" id="levelSlider" min="1" max="500" value="250" step="1">
                    </div>
                </div>
            </div>
        </div>

        <!-- Message & copy area (no emoji, just text) -->
        <div class="message-block">
            <div class="preview" id="messagePreview">
                Hello! I would Like A Level 250 With 1,000
            </div>

            <div class="action-row">
                <button class="copy-trigger" id="copyMessageBtn">
                    <span>📋</span> copy message
                </button>
                <div class="destinations">
                    <a href="https://discord.gg/nX2RJM4Cfe" target="_blank" class="dest">Discord server</a>
                    <a href="mailto:FishIdRatherNot@outlook.com" class="dest">Outlook</a>
                </div>
            </div>
            <div class="footnote">
                ✎ copy & send in our Discord or via Outlook — we’ll get back to you.
            </div>
        </div>

        <!-- small visual footer -->
        <div style="display: flex; justify-content: flex-end; font-family: 'Fraunces'; color: #3b4a42; padding: 0 10px; border-top: 2px dotted #9e947b; margin-top: 10px; padding-top: 16px;">
            <span>Fish? Nope! ~ handmade</span>
        </div>
    </div>

    <script>
        (function() {
            // ---------- DOM ----------
            const moneyButtons = document.querySelectorAll('.money-unit');
            const levelSlider = document.getElementById('levelSlider');
            const levelSpan = document.getElementById('levelValue');
            const messagePreview = document.getElementById('messagePreview');
            const selectedMoneySpan = document.getElementById('selectedMoneyDisplay');
            const copyBtn = document.getElementById('copyMessageBtn');

            // state
            let currentMoney = 1000;      // default 1k
            let currentLevel = 250;        // default 250

            // helpers
            function formatWithCommas(val) {
                return val.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            }

            function updateAll() {
                // update money display
                selectedMoneySpan.textContent = formatWithCommas(currentMoney);
                // build message
                const msg = `Hello! I would Like A Level ${currentLevel} With ${formatWithCommas(currentMoney)}`;
                messagePreview.textContent = msg;
                // sync level display
                levelSpan.textContent = currentLevel;
            }

            // remove selected class from all money buttons
            function clearMoneySelected() {
                moneyButtons.forEach(btn => btn.classList.remove('selected'));
            }

            function setActiveMoneyButton(value) {
                clearMoneySelected();
                moneyButtons.forEach(btn => {
                    if (parseInt(btn.getAttribute('data-value'), 10) === value) {
                        btn.classList.add('selected');
                    }
                });
            }

            // event: money click
            moneyButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const val = parseInt(this.getAttribute('data-value'), 10);
                    if (!isNaN(val) && val > 0) {
                        currentMoney = val;
                        setActiveMoneyButton(currentMoney);
                        updateAll();
                    }
                });
            });

            // level slider
            levelSlider.addEventListener('input', function() {
                currentLevel = parseInt(this.value, 10);
                updateAll();
            });

            // initial selection
            function init() {
                currentMoney = 1000;
                currentLevel = 250;
                setActiveMoneyButton(1000);
                levelSlider.value = currentLevel;
                updateAll();
            }
            init();

            // copy to clipboard
            copyBtn.addEventListener('click', function() {
                const text = messagePreview.textContent;
                navigator.clipboard.writeText(text).then(() => {
                    const original = copyBtn.innerHTML;
                    copyBtn.innerHTML = '<span>✓</span> copied!';
                    setTimeout(() => {
                        copyBtn.innerHTML = original;
                    }, 1400);
                }).catch(() => {
                    alert('Copy manually:\n' + text);
                });
            });
        })();
    </script>
</body>
</html>
